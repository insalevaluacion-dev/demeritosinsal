<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f5aab" />
  <title>INSAL Deméritos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: linear-gradient(160deg, #0a3d73, #0f5aab);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 320px;
      background: rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 28px 20px;
      backdrop-filter: blur(8px);
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.9; line-height: 1.5; }
    code { font-size: 12px; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>INSAL Deméritos</h1>
    <p>Configura <code>CAPACITOR_SERVER_URL</code> en <code>.env.capacitor</code> y ejecuta <code>npm run cap:sync</code>.</p>
  </div>
</body>
</html>
